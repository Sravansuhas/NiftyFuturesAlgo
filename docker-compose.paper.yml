# =============================================================================
# Aegis - FAST Paper Trading Compose File
# =============================================================================
#
# Recommended command:
#   docker-compose -f docker-compose.paper.yml up --build
#
# Key Features:
# - Fast startup (no forced Postgres/Redis)
# - Clearly shows "PAPER TRADING MODE" banner on start
# - Hot-reloads your code changes (volume mount)
# - Safe by default (FORCE_DRY_RUN=true)
#
# To switch to LIVE TRADING (very dangerous):
#   - Set FORCE_DRY_RUN=false in your .env
#   - Then run the main docker-compose.yml instead
#
# You will see a huge ASCII banner on startup telling you exactly
# whether you are in PAPER or LIVE mode.
# =============================================================================

services:
  trading-app:
    build: .
    container_name: nifty-paper-trader
    env_file:
      - .env
    environment:
      # Force paper trading mode visually
      - TRADING_MODE=paper
      - FORCE_DRY_RUN=true
    volumes:
      # Hot reload for development
      - .:/app
    tty: true
    stdin_open: true
    restart: unless-stopped
    # We don't need the heavy DBs for basic paper trading
    # If you later want Postgres/Redis, uncomment the sections below

